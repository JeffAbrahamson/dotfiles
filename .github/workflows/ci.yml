name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black==24.2.0 flake8

      - name: Show tool versions
        run: |
          python --version
          python -m black --version
          python -m flake8 --version

      - name: Check formatting with black
        run: ./script/python-checks.sh black

      - name: Lint with flake8
        run: |
          ./script/python-checks.sh flake8 | tee flake8.report

      - name: Upload flake8 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake8-report
          path: flake8.report

  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Show tool versions
        run: |
          python --version
          python -m pytest --version

      - name: Run pytest
        run: ./script/python-checks.sh pytest
